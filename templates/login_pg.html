<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
         <link rel="stylesheet" href="stylesheets\login.css">
         <script src="scripts/login.js"></script>
       
    </head>
    <body class="bg">
        <div class="main-container">
        
        <h1 style="text-align: center;" class="header">MealMentor</h1>
        <p class="brand-tagline">your personal calorie companion</p>  
        <form>
            <div style="text-align: center">
            <input type="text" id="email" placeholder="Emailaddress" required class="input"> 
            <p id="emailError" class="error"></p>    
            </div> 
            <br>
            <div  style="text-align: center">
            <input type="text" id="password" placeholder="Password" required class="input"> 
            <p id="passError" class="error"></p>    
            </div>
            <br>
            <div style="text-align: center">
            <button type="button" class="button" onclick="login()" >Login</button>
            
            </div>
            
            
        </form>
        <button  onclick="goToRegister()" id="createAccountBtn" class="create-button">Create a account</button>

        
        </div>
    </body>
</html>
